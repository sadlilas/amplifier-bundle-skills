bundle:
  name: skills-tool-behavior
  version: 1.0.0
  description: |
    Minimal skills support: just the tool-skills module and context instructions.

    No curated skills are pre-configured. Use this when your bundle brings its
    own skills via config.skills or when you only need workspace/user skills
    from the default discovery paths (.amplifier/skills/, ~/.amplifier/skills/).

tools:
  - module: tool-skills
    source: git+https://github.com/microsoft/amplifier-bundle-skills@main#subdirectory=modules/tool-skills
    config:
      visibility:
        enabled: true
        inject_role: "user"
        max_skills_visible: 50
        ephemeral: true
        priority: 20

context:
  include:
    - skills:context/skills-instructions.md
